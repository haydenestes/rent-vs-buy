<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef } = React;

// ─── FRED 5-YEAR % ANNUAL CHANGE DATA (49 periods, 1976–2024) ───
const FRED_DATA = [
  { housing: 10.75, rent: 6.49 },
  { housing: 10.87, rent: 7.33 },
  { housing: 8.83,  rent: 7.80 },
  { housing: 7.54,  rent: 7.89 },
  { housing: 5.49,  rent: 7.37 },
  { housing: 4.55,  rent: 6.90 },
  { housing: 4.76,  rent: 6.35 },
  { housing: 6.06,  rent: 5.69 },
  { housing: 5.50,  rent: 5.13 },
  { housing: 5.68,  rent: 4.93 },
  { housing: 5.76,  rent: 4.57 },
  { housing: 4.79,  rent: 4.10 },
  { housing: 3.94,  rent: 3.69 },
  { housing: 3.27,  rent: 3.40 },
  { housing: 2.88,  rent: 3.12 },
  { housing: 2.18,  rent: 2.83 },
  { housing: 2.91,  rent: 2.53 },
  { housing: 2.75,  rent: 2.49 },
  { housing: 3.43,  rent: 2.63 },
  { housing: 3.70,  rent: 2.87 },
  { housing: 4.57,  rent: 3.02 },
  { housing: 5.06,  rent: 3.30 },
  { housing: 5.83,  rent: 3.68 },
  { housing: 6.11,  rent: 3.70 },
  { housing: 6.67,  rent: 3.51 },
  { housing: 7.72,  rent: 3.44 },
  { housing: 8.27,  rent: 3.26 },
  { housing: 7.70,  rent: 3.22 },
  { housing: 5.88,  rent: 3.36 },
  { housing: 3.15,  rent: 3.55 },
  { housing: -0.46, rent: 3.04 },
  { housing: -3.09, rent: 2.63 },
  { housing: -4.03, rent: 2.23 },
  { housing: -3.18, rent: 1.99 },
  { housing: -1.13, rent: 1.89 },
  { housing: 1.38,  rent: 2.48 },
  { housing: 3.06,  rent: 3.03 },
  { housing: 4.45,  rent: 3.32 },
  { housing: 5.26,  rent: 3.53 },
  { housing: 5.24,  rent: 3.64 },
  { housing: 5.18,  rent: 3.71 },
  { housing: 5.72,  rent: 3.38 },
  { housing: 8.45,  rent: 3.35 },
  { housing: 8.84,  rent: 4.29 },
  { housing: 9.21,  rent: 4.82 },
  { housing: 8.13,  rent: 4.05 },
  { housing: 6.57,  rent: 3.63 },
  { housing: 2.83,  rent: 2.87 },
  { housing: 1.25,  rent: 1.19 },
];

// ─── FINANCE MATH ───
function calcIRR(cashflows, maxIter = 1000, tol = 1e-6) {
  let rate = 0.1;
  for (let i = 0; i < maxIter; i++) {
    let npv = 0, dnpv = 0;
    for (let t = 0; t < cashflows.length; t++) {
      npv  += cashflows[t] / Math.pow(1 + rate, t);
      dnpv -= t * cashflows[t] / Math.pow(1 + rate, t + 1);
    }
    if (Math.abs(dnpv) < 1e-10) break;
    const newRate = rate - npv / dnpv;
    if (Math.abs(newRate - rate) < tol) return newRate;
    rate = newRate;
  }
  return rate;
}

function pmt(rate, nper, pv) {
  if (rate === 0) return pv / nper;
  return rate * pv / (1 - Math.pow(1 + rate, -nper));
}

function cumipmt(rate, nper, pv, start, end) {
  let total = 0;
  let balance = pv;
  const payment = pmt(rate, nper, pv);
  for (let p = 1; p <= end; p++) {
    const interest = balance * rate;
    const principal = payment - interest;
    if (p >= start) total += interest;
    balance -= principal;
  }
  return total;
}

function cumprinc(rate, nper, pv, start, end) {
  let total = 0;
  let balance = pv;
  const payment = pmt(rate, nper, pv);
  for (let p = 1; p <= end; p++) {
    const interest = balance * rate;
    const principal = payment - interest;
    if (p >= start) total += principal;
    balance -= principal;
  }
  return total;
}

function runScenario(params, fredRow) {
  const {
    purchasePrice, annualRent, taxBracket, propertyTaxRate,
    loanPct, loanLengthYrs, interestRate, salesExpensePct,
    annualInsurance, annualMaint, annualExpGrowth, exclusion
  } = params;

  const houseGrowth = fredRow.housing / 100;
  const rentGrowth  = fredRow.rent / 100;

  const downPayment  = (1 - loanPct) * purchasePrice;
  const loanAmount   = loanPct * purchasePrice;
  const monthlyRate  = interestRate / 12;
  const nper         = loanLengthYrs * 12;
  const monthlyPmt   = pmt(monthlyRate, nper, loanAmount);

  const rows = [];
  for (let yr = 1; yr <= 5; yr++) {
    const propTax    = purchasePrice * propertyTaxRate * Math.pow(1 + houseGrowth, yr - 1);
    const insurance  = annualInsurance * Math.pow(1 + annualExpGrowth, yr - 1);
    const maint      = annualMaint * Math.pow(1 + annualExpGrowth, yr - 1);
    const mortgage   = monthlyPmt * 12;
    const outflow    = propTax + insurance + maint + mortgage;

    const interest   = cumipmt(monthlyRate, nper, loanAmount, (yr - 1) * 12 + 1, yr * 12);
    const totalDeductions = propTax + interest;
    const taxSavings = taxBracket * totalDeductions;

    const rent       = annualRent * Math.pow(1 + rentGrowth, yr - 1);
    const afterTaxCF = -outflow + taxSavings + rent;

    const propValue  = purchasePrice * Math.pow(1 + houseGrowth, yr);
    const sellExp    = salesExpensePct * propValue;
    const mortBalance= loanAmount - cumprinc(monthlyRate, nper, loanAmount, 1, yr * 12);
    const btSaleCF   = propValue - sellExp - mortBalance;
    const gain       = propValue - sellExp - purchasePrice;
    const tax        = gain > exclusion ? taxBracket * (gain - exclusion) : 0;
    const atSaleCF   = btSaleCF - tax;

    rows.push({ yr, afterTaxCF, atSaleCF, propValue, propTax, insurance, maint, mortgage, taxSavings, rent });
  }

  // IRRs for each year
  const irrs = rows.map((row, i) => {
    const cfs = [-downPayment];
    for (let j = 0; j <= i; j++) {
      if (j < i) cfs.push(rows[j].afterTaxCF);
      else cfs.push(rows[j].afterTaxCF + rows[j].atSaleCF);
    }
    return calcIRR(cfs);
  });

  return { irrs, rows, downPayment, houseGrowth, rentGrowth };
}

function runMonteCarlo(params, n = 1000) {
  const results = [];
  for (let i = 0; i < n; i++) {
    const fredRow = FRED_DATA[Math.floor(Math.random() * FRED_DATA.length)];
    const { irrs } = runScenario(params, fredRow);
    results.push(irrs[4]); // year 5 IRR
  }
  return results;
}

function buildHistogram(data, bins = 30) {
  const min = Math.min(...data);
  const max = Math.max(...data);
  const width = (max - min) / bins;
  const counts = Array(bins).fill(0);
  data.forEach(v => {
    const b = Math.min(Math.floor((v - min) / width), bins - 1);
    counts[b]++;
  });
  return { counts, min, max, width };
}

// ─── ROUNDING HELPER ───
// Infers decimal places from the step size and returns a cleanly rounded value.
function round(val, step) {
  if (!step || step >= 1) return Math.round(val);
  const decimals = Math.round(-Math.log10(step));
  return parseFloat(val.toFixed(decimals));
}

// ─── INPUT FIELD ───
function Field({ label, hint, prefix, suffix, value, onChange, min, max, step, showRange }) {
  const display = round(value, step);
  return (
    <div className="input-cell">
      <div className="input-label">
        <span>{label}</span>
        {hint && <span className="input-hint">{hint}</span>}
      </div>
      <div className="input-row">
        {prefix && <span className="currency-prefix">{prefix}</span>}
        <input
          className="num-input"
          type="number"
          value={display}
          min={min} max={max} step={step || 1}
          onChange={e => onChange(parseFloat(e.target.value) || 0)}
        />
        {suffix && <span className="pct-suffix">{suffix}</span>}
      </div>
      {showRange && (
        <div className="range-wrapper">
          <input type="range" min={min} max={max} step={step || 1}
            value={display} onChange={e => onChange(parseFloat(e.target.value))} />
        </div>
      )}
    </div>
  );
}

// ─── HISTOGRAM ───
function Histogram({ data, mean }) {
  const { counts, min, max, width } = buildHistogram(data, 28);
  const maxCount = Math.max(...counts);
  const pctPositive = (data.filter(d => d > 0).length / data.length * 100).toFixed(0);

  return (
    <div className="chart-container">
      <div className="chart-title">IRR Distribution — 1,000 Scenarios</div>
      <div className="chart-subtitle">
        Year 5 internal rate of return across historical market cycles · {pctPositive}% of scenarios show positive return
      </div>
      <div className="histogram-wrap">
        {counts.map((count, i) => {
          const binStart = min + i * width;
          const binEnd = binStart + width;
          const isNeg = binEnd <= 0;
          const isMean = binStart <= mean && mean < binEnd;
          const pct = count / maxCount * 100;
          const color = isNeg
            ? 'var(--red)'
            : isMean
            ? 'var(--gold)'
            : 'var(--green)';
          return (
            <div key={i} className="hist-bar-wrap">
              <div
                className="hist-bar"
                style={{ height: `${pct}%`, background: color, opacity: 0.75 }}
                data-tip={`${(binStart * 100).toFixed(1)}% – ${(binEnd * 100).toFixed(1)}%: ${count} scenarios`}
              />
            </div>
          );
        })}
      </div>
      <div className="hist-axis">
        <span className="hist-axis-label">{(min * 100).toFixed(0)}% IRR</span>
        <span className="hist-axis-label" style={{color: 'var(--gold)'}}>▲ mean {(mean * 100).toFixed(1)}%</span>
        <span className="hist-axis-label">{(max * 100).toFixed(0)}% IRR</span>
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function App() {
  const [params, setParams] = useState({
    purchasePrice: 800000,
    annualRent: 36000,
    taxBracket: 0.28,
    propertyTaxRate: 0.015,
    loanPct: 0.80,
    loanLengthYrs: 30,
    interestRate: 0.07,
    salesExpensePct: 0.07,
    annualInsurance: 1200,
    annualMaint: 2400,
    annualExpGrowth: 0.02,
    exclusion: 250000,
  });

  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);

  const set = (key) => (val) => setParams(p => ({ ...p, [key]: val }));

  const handleRun = useCallback(() => {
    setLoading(true);
    setResults(null);
    setTimeout(() => {
      const mcData = runMonteCarlo(params);
      const mean = mcData.reduce((a, b) => a + b, 0) / mcData.length;
      const minV = Math.min(...mcData);
      const maxV = Math.max(...mcData);
      const pctPos = mcData.filter(d => d > 0).length / mcData.length;

      // single scenario for year-by-year table (use mean-ish FRED row)
      const medianFred = FRED_DATA[24]; // roughly middle
      const single = runScenario(params, medianFred);

      setResults({ mcData, mean, minV, maxV, pctPos, single });
      setLoading(false);
    }, 80);
  }, [params]);

  const downPayment = (1 - params.loanPct) * params.purchasePrice;
  const loanAmount  = params.loanPct * params.purchasePrice;
  const monthlyRate = params.interestRate / 12;
  const nper        = params.loanLengthYrs * 12;
  const monthlyPmt  = pmt(monthlyRate, nper, loanAmount);

  const fmt = (n) => n < 0
    ? `(${Math.abs(n).toLocaleString('en-US', {maximumFractionDigits:0})})`
    : n.toLocaleString('en-US', {maximumFractionDigits:0});

  const fmtPct = (n) => `${(n * 100).toFixed(1)}%`;

  const verdictText = results
    ? results.pctPos >= 0.75
      ? { cls: 'positive', icon: '↗', head: 'Buying looks favorable.', detail: `Across 1,000 historical scenarios, buying outperformed renting ${(results.pctPos * 100).toFixed(0)}% of the time at your 5-year horizon.` }
      : results.pctPos >= 0.50
      ? { cls: 'neutral', icon: '→', head: "It's a close call.", detail: `Buying outperforms in ${(results.pctPos * 100).toFixed(0)}% of historical scenarios. Outcome is highly sensitive to which market cycle you enter.` }
      : { cls: 'negative', icon: '↙', head: 'Renting may be smarter.', detail: `Only ${(results.pctPos * 100).toFixed(0)}% of historical scenarios favor buying at these inputs. Consider waiting or adjusting your horizon.` }
    : null;

  return (
    <div className="app">
      <header className="header">
        <div className="header-left">
          <div className="header-eyebrow">Monte Carlo Home Decision Simulator</div>
          <h1 className="header-title">Own or <em>Rent?</em></h1>
          <p className="header-sub">
            1,000 simulated scenarios using 50 years of Federal Reserve housing data.
            Enter your numbers, run the simulation.
          </p>
        </div>
        <div className="header-badge">FRED Data · 1976–2024</div>
      </header>

      {/* INPUTS */}
      <div className="input-section">
        <div className="section-label">Your Situation</div>
        <div className="input-grid">
          <Field label="Purchase Price" prefix="$"
            value={params.purchasePrice} onChange={set('purchasePrice')}
            min={100000} max={5000000} step={10000} showRange />
          <Field label="Annual Rent (current)" prefix="$"
            hint="What you pay now" value={params.annualRent} onChange={set('annualRent')}
            min={6000} max={200000} step={1000} showRange />
          <Field label="Down Payment %" suffix="%"
            hint={`$${downPayment.toLocaleString('en-US', {maximumFractionDigits:0})}`}
            value={params.loanPct * 100 - (params.loanPct * 100 - (100 - params.loanPct * 100))}
            onChange={(v) => set('loanPct')(1 - v / 100)}
            min={3} max={50} step={1} showRange />
          <Field label="Interest Rate" suffix="%"
            value={params.interestRate * 100} onChange={(v) => set('interestRate')(v / 100)}
            min={2} max={12} step={0.1} showRange />
          <Field label="Loan Term (years)"
            value={params.loanLengthYrs} onChange={set('loanLengthYrs')}
            min={10} max={30} step={5} showRange />
          <Field label="Tax Bracket" suffix="%"
            value={params.taxBracket * 100} onChange={(v) => set('taxBracket')(v / 100)}
            min={10} max={37} step={1} showRange />
          <Field label="Property Tax Rate" suffix="%"
            value={params.propertyTaxRate * 100} onChange={(v) => set('propertyTaxRate')(v / 100)}
            min={0.3} max={3} step={0.05} showRange />
          <Field label="Annual Sales Expense %" suffix="%"
            hint="Agent fees, closing costs" value={params.salesExpensePct * 100}
            onChange={(v) => set('salesExpensePct')(v / 100)}
            min={3} max={10} step={0.5} showRange />
        </div>
      </div>

      {/* DERIVED */}
      <div className="input-section">
        <div className="section-label">Calculated Inputs</div>
        <div className="input-grid">
          <div className="input-cell">
            <div className="input-label">Down Payment</div>
            <div className="input-row">
              <span className="currency-prefix">$</span>
              <span className="num-input" style={{fontFamily:'Georgia,serif',fontSize:22,fontWeight:600}}>
                {downPayment.toLocaleString('en-US', {maximumFractionDigits:0})}
              </span>
            </div>
          </div>
          <div className="input-cell">
            <div className="input-label">Loan Amount</div>
            <div className="input-row">
              <span className="currency-prefix">$</span>
              <span className="num-input" style={{fontFamily:'Georgia,serif',fontSize:22,fontWeight:600}}>
                {loanAmount.toLocaleString('en-US', {maximumFractionDigits:0})}
              </span>
            </div>
          </div>
          <div className="input-cell">
            <div className="input-label">Est. Monthly Payment <span className="input-hint">P+I only</span></div>
            <div className="input-row">
              <span className="currency-prefix">$</span>
              <span className="num-input" style={{fontFamily:'Georgia,serif',fontSize:22,fontWeight:600}}>
                {monthlyPmt.toLocaleString('en-US', {maximumFractionDigits:0})}
              </span>
            </div>
          </div>
        </div>
      </div>

      {/* RUN */}
      <div className="run-section">
        <button className="run-btn" onClick={handleRun} disabled={loading}>
          <span>{loading ? 'Running…' : 'Run 1,000 Scenarios'}</span>
        </button>
        <div className="run-note">
          Draws randomly from 49 historical FRED periods.<br />
          Each run produces a fresh distribution.
        </div>
      </div>

      {loading && (
        <div style={{marginBottom: 32}}>
          <div className="loading-bar"><div className="loading-bar-inner" /></div>
          <div style={{fontSize:11, color:'var(--ink-muted)'}}>Simulating 1,000 market cycles…</div>
        </div>
      )}

      {/* RESULTS */}
      {results && (
        <div className="results-section">
          <div className="section-label">Simulation Results</div>

          <div className={`verdict ${verdictText.cls}`}>
            <div className="verdict-icon">{verdictText.icon}</div>
            <div className="verdict-text">
              <div className="verdict-headline">{verdictText.head}</div>
              <div className="verdict-detail">{verdictText.detail}</div>
            </div>
          </div>

          <div className="stat-row">
            <div className="stat-card">
              <div className="stat-label">Mean IRR (Year 5)</div>
              <div className={`stat-value ${results.mean > 0 ? 'positive' : 'negative'}`}>
                {fmtPct(results.mean)}
              </div>
              <div className="stat-sub">average across all scenarios</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Best Case</div>
              <div className="stat-value positive">{fmtPct(results.maxV)}</div>
              <div className="stat-sub">highest observed IRR</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Worst Case</div>
              <div className={`stat-value ${results.minV > 0 ? 'positive' : 'negative'}`}>
                {fmtPct(results.minV)}
              </div>
              <div className="stat-sub">lowest observed IRR</div>
            </div>
          </div>

          <Histogram data={results.mcData} mean={results.mean} />

          {/* YEAR BY YEAR */}
          <div className="breakdown">
            <div className="breakdown-header">
              <div className="breakdown-title">Year-by-Year Breakdown</div>
              <div className="breakdown-sub">Median market scenario (FRED period 25) · After-tax cash flows</div>
            </div>
            <table className="breakdown-table">
              <thead>
                <tr>
                  <th>Year</th>
                  <th>Property Value</th>
                  <th>Annual Net CF</th>
                  <th>Rent Saved</th>
                  <th>Tax Savings</th>
                  <th>IRR if Sold</th>
                </tr>
              </thead>
              <tbody>
                {results.single.rows.map((row, i) => (
                  <tr key={i}>
                    <td><span className="year-label">Yr {row.yr}</span></td>
                    <td>${row.propValue.toLocaleString('en-US', {maximumFractionDigits:0})}</td>
                    <td style={{color: row.afterTaxCF > 0 ? 'var(--green)' : 'var(--ink-soft)'}}>
                      ${fmt(row.afterTaxCF)}
                    </td>
                    <td>${row.rent.toLocaleString('en-US', {maximumFractionDigits:0})}</td>
                    <td>${row.taxSavings.toLocaleString('en-US', {maximumFractionDigits:0})}</td>
                    <td className="irr-val">{fmtPct(results.single.irrs[i])}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="footnote">
            <strong>Methodology:</strong> Each scenario samples one of 49 five-year average growth rates from the Federal Reserve Economic Data (FRED) for housing prices and rent (1976–2024). Cash flows account for mortgage payments, property tax, insurance, maintenance, tax deductions (interest + property tax), and the opportunity cost of the down payment. IRR is calculated at year 5 assuming sale at that year's estimated market value, net of selling expenses and capital gains tax (above the $250k exclusion). <strong>This is a decision-support tool, not financial advice.</strong>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
